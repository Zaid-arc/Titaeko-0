<!DOCTYPE html>
<html>

<head>
<title>Titaeko Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
background:#f1f1f1;
margin:0;
}

.header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:10px;
}

.card{
background:white;
padding:10px;
margin-top:10px;
border-radius:10px;
}

button{
padding:10px;
border:none;
background:black;
color:white;
border-radius:5px;
}

input{
padding:10px;
margin-top:5px;
width:100%;
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="header">Titaeko Platform</div>

<div class="container">

<!-- Upload Section -->
<div class="card">

<label for="fileInput">📁 Choose File</label>
<input type="file" id="fileInput">

<input type="text" id="titleInput" placeholder="Enter title">

<button onclick="uploadPost()">Upload</button>

</div>

<!-- Posts -->
<div id="posts"></div>

</div>

<script>

function uploadPost(){

let file = document.getElementById("fileInput").files[0];
let title = document.getElementById("titleInput").value;

if(!file){
alert("Choose file first");
return;
}

let url = URL.createObjectURL(file);

let post = document.createElement("div");
post.className = "card";

post.innerHTML =
"<h3>"+title+"</h3><img src='"+url+"'>"+
"<br><button onclick='likePost(this)'>❤️ Like</button>";

document.getElementById("posts").appendChild(post);

}

function likePost(btn){
btn.innerText = "❤️ Liked";
}

</script>

</body>
</html>
